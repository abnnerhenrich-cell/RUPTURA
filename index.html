<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUPTURA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(255, 166, 0, 0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255, 115, 0, 0.06), transparent 24%),
        linear-gradient(135deg, #0f0f10, #171717 50%, #111111);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(34,34,34,0.96), rgba(24,24,24,0.98));
      border: 1px solid rgba(255, 149, 0, 0.20);
      border-radius: 24px;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.04);
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-container {
      width: 78px;
      height: 78px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,140,0,0.12), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,140,0,0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #ffd7a6;
      text-transform: uppercase;
    }

    .discount-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .discount-box label {
      color: #ffc57d;
      font-weight: 700;
      font-size: 14px;
    }

    select, input {
      background: linear-gradient(180deg, #141414, #101010);
      color: #fff;
      border: 1px solid rgba(255, 145, 0, 0.22);
      border-radius: 14px;
      padding: 11px 13px;
      outline: none;
      transition: 0.2s ease;
      font-weight: 600;
      min-height: 46px;
    }

    select:focus, input:focus {
      border-color: #ff9d2f;
      box-shadow: 0 0 0 4px rgba(255, 157, 47, 0.14);
    }

    .section-title {
      font-size: 22px;
      margin: 12px 0 16px;
      color: #ffc06f;
      font-weight: 800;
      text-align: center;
    }

    .products-table {
      display: grid;
      gap: 12px;
      margin-bottom: 24px;
    }

    .product-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
      align-items: center;
      background: linear-gradient(180deg, #1d1d1d, #171717);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 14px;
    }

    .product-name {
      color: #ffbf76;
      font-weight: 800;
      font-size: 16px;
    }

    .product-price {
      color: #e9d2b4;
      font-size: 14px;
      font-weight: 600;
    }

    .qty-input {
      width: 100%;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .resource-card {
      background: linear-gradient(180deg, #1d1d1d, #171717);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-card span:first-child {
      font-size: 13px;
      font-weight: 600;
      color: #e7d6c5;
    }

    .resource-value {
      font-size: 28px;
      font-weight: 800;
      color: #ffab3d;
    }

    .summary {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .summary-box {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, rgba(255,140,0,0.18), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,140,0,0.24);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    .btn-clear {
      border: none;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      background: linear-gradient(180deg, #2c2c2c, #242424);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn-clear:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    @media (max-width: 760px) {
      .product-row {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .site-title {
        font-size: 24px;
      }

      .summary-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo-container">
          <img src="https://i.imgur.com/KOjV87R.png" alt="Logo" class="logo" />
        </div>
        <div class="site-title">RUPTURA</div>
      </div>

      <div class="discount-box">
        <label for="discount">Taxa / Desconto:</label>
        <select id="discount">
          <option value="0">Nenhum</option>
          <option value="5">+5%</option>
          <option value="10">+10%</option>
          <option value="20">+20%</option>
          <option value="30">+30%</option>
          <option value="-5">-5%</option>
          <option value="-10">-10%</option>
          <option value="-20">-20%</option>
          <option value="-30">-30%</option>
        </select>
      </div>
    </div>

    <div class="section-title">Produtos</div>
    <div class="products-table" id="productsTable"></div>

    <div class="section-title">Materiais Necessários</div>
    <div class="resources-grid" id="resourcesGrid"></div>

    <div class="summary">
      <div class="summary-box">Total valor: <span id="totalValue">R$ 0,00</span></div>
    </div>

    <div class="actions">
      <button class="btn-clear" onclick="clearAll()">Limpar tudo</button>
    </div>
  </div>

  <script>
    const products = {
      COLETE: {
        name: 'COLETE',
        price: 0,
        materials: {
          'Placas blindadas': 2,
          'Lonas': 5
        }
      },
      'TEC-9': {
        name: 'TEC-9',
        price: 0,
        materials: {
          'Tubos de Plástico': 3,
          'Peças de Arma Média': 3,
          'Dinheiro Sujo': 500
        }
      },
      EMPUNHADURA: {
        name: 'EMPUNHADURA',
        price: 0,
        materials: {
          'Plásticos': 10,
          'Borrachas': 10,
          'Componente eletrônico': 1,
          'Fita adesiva': 1
        }
      },
      LANTERNA: {
        name: 'LANTERNA',
        price: 0,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA': 1,
          'Fita isolante': 1
        }
      },
      PENTE: {
        name: 'PENTE',
        price: 0,
        materials: {
          'Alumínios': 35,
          'Plásticos': 50,
          'Borrachas': 50,
          'Fitas isolantes': 2,
          'Fitas adesivas': 2
        }
      },
      MIRA: {
        name: 'MIRA',
        price: 0,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA+': 1,
          'Fita adesiva': 1
        }
      },
      SILENCIADOR: {
        name: 'SILENCIADOR',
        price: 0,
        materials: {
          'Cobres': 25,
          'Plásticos': 50,
          'Garrafa vazia': 1,
          'Fita isolante': 1,
          'Fita adesiva': 1,
          'Pastas de dente': 2
        }
      },
      PECAS: {
        name: 'PEÇAS DE ARMA MÉDIA',
        price: 0,
        materials: {
          'Alumínios': 25,
          'Cobres': 25,
          'Vidros': 25,
          'Borrachas': 25,
          'Peças de Arma': 3,
          'Corpo de Sub': 1,
          'Dinheiro Sujo': 1000
        }
      },
      PLACA: {
        name: 'PLACA BLINDADA',
        price: 0,
        materials: {
          'Alumínios': 40,
          'Cobres': 40,
          'Vidros': 70,
          'Plásticos': 70,
          'Borrachas': 80,
          'Chapas': 2,
          'Placas': 2,
          'Dinheiro Sujo': 500
        }
      }
    };

    function formatCurrency(value) {
      return Number(value).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function renderProducts() {
      const table = document.getElementById('productsTable');
      table.innerHTML = '';

      Object.keys(products).forEach(key => {
        const product = products[key];

        const row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
          <div>
            <div class="product-name">${product.name}</div>
            <div class="product-price">${formatCurrency(product.price)}</div>
          </div>
          <input
            type="number"
            min="0"
            value="0"
            class="qty-input"
            data-product="${key}"
          />
          <div style="text-align:center; color:#cfae8b; font-weight:700;">Qtd</div>
        `;

        table.appendChild(row);
      });

      document.querySelectorAll('.qty-input').forEach(input => {
        input.addEventListener('input', updateEverything);
      });
    }

    function updateEverything() {
      const totalMaterials = {};
      let totalBase = 0;
      const rate = Number(document.getElementById('discount').value) || 0;

      document.querySelectorAll('.qty-input').forEach(input => {
        const productKey = input.dataset.product;
        const quantity = Number(input.value) || 0;

        if (quantity <= 0) return;

        const product = products[productKey];
        totalBase += Number(product.price) * quantity;

        Object.entries(product.materials).forEach(([material, amount]) => {
          if (!totalMaterials[material]) {
            totalMaterials[material] = 0;
          }
          totalMaterials[material] += Number(amount) * quantity;
        });
      });

      renderMaterials(totalMaterials);

      const totalFinal = totalBase + (totalBase * rate / 100);
      document.getElementById('totalValue').textContent = formatCurrency(totalFinal);
    }

    function renderMaterials(materials) {
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = '';

      if (Object.keys(materials).length === 0) {
        grid.innerHTML = `
          <div class="resource-card">
            <span>Nenhum material</span>
            <span class="resource-value">0</span>
          </div>
        `;
        return;
      }

      Object.entries(materials).forEach(([material, total]) => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <span>${material}</span>
          <span class="resource-value">${total}</span>
        `;
        grid.appendChild(card);
      });
    }

    function clearAll() {
      document.querySelectorAll('.qty-input').forEach(input => {
        input.value = 0;
      });

      document.getElementById('discount').value = 0;
      updateEverything();
    }

    document.getElementById('discount').addEventListener('change', updateEverything);

    renderProducts();
    updateEverything();
  </script>
</body>
</html>
