<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUPTURA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(255, 166, 0, 0.10), transparent 28%),
        linear-gradient(135deg, #0f0f10, #171717 50%, #111111);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(34,34,34,0.97), rgba(24,24,24,0.99));
      border: 1px solid rgba(255, 149, 0, 0.18);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-container {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,140,0,0.24);
      background: linear-gradient(180deg, rgba(255,140,0,0.12), rgba(255,255,255,0.03));
      flex-shrink: 0;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .site-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #ffd7a6;
    }

    .discount-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .discount-box label {
      color: #ffc57d;
      font-weight: 700;
      font-size: 14px;
    }

    select,
    input {
      background: linear-gradient(180deg, #141414, #101010);
      color: #fff;
      border: 1px solid rgba(255, 145, 0, 0.22);
      border-radius: 14px;
      padding: 11px 13px;
      min-height: 46px;
      font-weight: 700;
      outline: none;
    }

    .products-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .product-btn {
      background: linear-gradient(180deg, #1f1f1f, #181818);
      color: #ffbf76;
      border: 1px solid rgba(255, 140, 0, 0.16);
      padding: 14px 12px;
      border-radius: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .product-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,157,47,0.35);
      color: #ffe2bf;
    }

    .product-btn.active {
      background: linear-gradient(180deg, rgba(255,153,51,0.34), rgba(255,122,0,0.12));
      color: #fff;
      border-color: rgba(255,140,0,0.48);
      box-shadow: 0 0 18px rgba(255,140,0,0.14);
    }

    .product-card {
      background: linear-gradient(180deg, #1c1c1c, #171717);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .product-info h2 {
      font-size: 28px;
      color: #ffb357;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .product-price {
      color: #ffd6a9;
      font-weight: 600;
      font-size: 15px;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .qty-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffb14f, #ff7f11);
      color: #181818;
      font-size: 24px;
      font-weight: 800;
      cursor: pointer;
    }

    .qty-input {
      width: 110px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
    }

    .materials-box {
      background: linear-gradient(180deg, #1c1c1c, #171717);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 14px;
      color: #ffc06f;
      font-weight: 800;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .resource-card {
      background: linear-gradient(180deg, #1d1d1d, #171717);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .resource-card span:first-child {
      font-size: 13px;
      font-weight: 600;
      color: #e7d6c5;
    }

    .resource-value {
      font-size: 28px;
      font-weight: 800;
      color: #ffab3d;
    }

    .summary {
      display: flex;
      justify-content: center;
      margin: 20px 0 14px;
    }

    .summary-box {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, rgba(255,140,0,0.18), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,140,0,0.24);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    .btn-clear {
      border: none;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, #2c2c2c, #242424);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
    }

    @media (max-width: 700px) {
      .product-card {
        justify-content: center;
        text-align: center;
      }

      .site-title {
        font-size: 24px;
      }

      .summary-box {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo-container">
          <img src="https://i.imgur.com/KOjV87R.png" alt="Logo" class="logo">
        </div>
        <div class="site-title">RUPTURA</div>
      </div>

      <div class="discount-box">
        <label for="discount">Taxa / Desconto:</label>
        <select id="discount">
          <option value="0">Nenhum</option>
          <option value="5">+5%</option>
          <option value="10">+10%</option>
          <option value="20">+20%</option>
          <option value="30">+30%</option>
          <option value="-5">-5%</option>
          <option value="-10">-10%</option>
          <option value="-20">-20%</option>
          <option value="-30">-30%</option>
        </select>
      </div>
    </div>

    <div class="products-list" id="productsList"></div>

    <div class="product-card">
      <div class="product-info">
        <h2 id="productName">COLETE</h2>
        <div class="product-price" id="productPrice">R$ 0,00</div>
      </div>

      <div class="qty-box">
        <button class="qty-btn" onclick="changeQty(-1)">-</button>
        <input
          type="number"
          min="0"
          class="qty-input"
          id="qtyInput"
          value="0"
        />
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <div class="materials-box">
      <div class="section-title">Materiais Necessários</div>
      <div class="resources-grid" id="resourcesGrid"></div>
    </div>

    <div class="summary">
      <div class="summary-box">Total valor: <span id="totalValue">R$ 0,00</span></div>
    </div>

    <div class="actions">
      <button class="btn-clear" onclick="clearAll()">Limpar tudo</button>
    </div>
  </div>

  <script>
    const products = {
      COLETE: {
        name: 'COLETE',
        price: 1,
        materials: {
          'Placas blindadas': 2,
          'Lonas': 5
        }
      },
      'TEC-9': {
        name: 'TEC-9',
        price: 1,
        materials: {
          'Tubos de Plástico': 3,
          'Peças de Arma Média': 3,
          'Dinheiro Sujo': 500
        }
      },
      EMPUNHADURA: {
        name: 'EMPUNHADURA',
        price: 1,
        materials: {
          'Plásticos': 10,
          'Borrachas': 10,
          'Componente eletrônico': 1,
          'Fita adesiva': 1
        }
      },
      LANTERNA: {
        name: 'LANTERNA',
        price: 0,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA': 1,
          'Fita isolante': 1
        }
      },
      PENTE: {
        name: 'PENTE',
        price: 0,
        materials: {
          'Alumínios': 35,
          'Plásticos': 50,
          'Borrachas': 50,
          'Fitas isolantes': 2,
          'Fitas adesivas': 2
        }
      },
      MIRA: {
        name: 'MIRA',
        price: 0,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA+': 1,
          'Fita adesiva': 1
        }
      },
      SILENCIADOR: {
        name: 'SILENCIADOR',
        price: 0,
        materials: {
          'Cobres': 25,
          'Plásticos': 50,
          'Garrafa vazia': 1,
          'Fita isolante': 1,
          'Fita adesiva': 1,
          'Pastas de dente': 2
        }
      },
      PECAS: {
        name: 'PEÇAS DE ARMA MÉDIA',
        price: 0,
        materials: {
          'Alumínios': 25,
          'Cobres': 25,
          'Vidros': 25,
          'Borrachas': 25,
          'Peças de Arma': 3,
          'Corpo de Sub': 1,
          'Dinheiro Sujo': 1000
        }
      },
      PLACA: {
        name: 'PLACA BLINDADA',
        price: 0,
        materials: {
          'Alumínios': 40,
          'Cobres': 40,
          'Vidros': 70,
          'Plásticos': 70,
          'Borrachas': 80,
          'Chapas': 2,
          'Placas': 2,
          'Dinheiro Sujo': 500
        }
      }
    };

    let selectedProduct = 'COLETE';
    const quantities = {};

    Object.keys(products).forEach(key => {
      quantities[key] = 0;
    });

    function formatCurrency(value) {
      return Number(value).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function renderProductButtons() {
      const list = document.getElementById('productsList');
      list.innerHTML = '';

      Object.keys(products).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'product-btn' + (key === selectedProduct ? ' active' : '');
        btn.textContent = products[key].name;
        btn.onclick = () => {
          selectedProduct = key;
          updateSelectedProduct();
          renderProductButtons();
        };
        list.appendChild(btn);
      });
    }

    function updateSelectedProduct() {
      const product = products[selectedProduct];
      document.getElementById('productName').textContent = product.name;
      document.getElementById('productPrice').textContent = formatCurrency(product.price);
      document.getElementById('qtyInput').value = quantities[selectedProduct];
    }

    function setCurrentQty(value) {
      const newValue = Number(value) || 0;
      quantities[selectedProduct] = newValue < 0 ? 0 : newValue;
      document.getElementById('qtyInput').value = quantities[selectedProduct];
      updateEverything();
    }

    function changeQty(amount) {
      const current = quantities[selectedProduct] || 0;
      const next = current + amount;
      setCurrentQty(next);
    }

    function updateEverything() {
      const totalMaterials = {};
      let totalBase = 0;
      const rate = Number(document.getElementById('discount').value) || 0;

      Object.keys(quantities).forEach(productKey => {
        const quantity = Number(quantities[productKey]) || 0;
        if (quantity <= 0) return;

        const product = products[productKey];
        totalBase += Number(product.price) * quantity;

        Object.entries(product.materials).forEach(([material, amount]) => {
          if (!totalMaterials[material]) {
            totalMaterials[material] = 0;
          }
          totalMaterials[material] += Number(amount) * quantity;
        });
      });

      renderMaterials(totalMaterials);

      const totalFinal = totalBase + (totalBase * rate / 100);
      document.getElementById('totalValue').textContent = formatCurrency(totalFinal);
    }

    function renderMaterials(materials) {
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = '';

      if (Object.keys(materials).length === 0) {
        grid.innerHTML = `
          <div class="resource-card">
            <span>Nenhum material</span>
            <span class="resource-value">0</span>
          </div>
        `;
        return;
      }

      Object.entries(materials).forEach(([material, total]) => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <span>${material}</span>
          <span class="resource-value">${total}</span>
        `;
        grid.appendChild(card);
      });
    }

    function clearAll() {
      Object.keys(quantities).forEach(key => {
        quantities[key] = 0;
      });

      document.getElementById('discount').value = 0;
      updateSelectedProduct();
      updateEverything();
    }

    document.getElementById('discount').addEventListener('change', updateEverything);

    document.getElementById('qtyInput').addEventListener('input', (e) => {
      setCurrentQty(e.target.value);
    });

    renderProductButtons();
    updateSelectedProduct();
    updateEverything();
  </script>
</body>
</html>
