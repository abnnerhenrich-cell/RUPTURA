<script>
  const products = {
    COLETE: {
      name: 'COLETE',
      price: 0,
      materials: {
        'Placas blindadas': 2,
        'Lonas': 5
      }
    },
    'TEC-9': {
      name: 'TEC-9',
      price: 0,
      materials: {
        'Tubos de Plástico': 3,
        'Peças de Arma Média': 3,
        'Dinheiro Sujo': 500
      }
    },
    EMPUNHADURA: {
      name: 'EMPUNHADURA',
      price: 0,
      materials: {
        'Plásticos': 10,
        'Borrachas': 10,
        'Componente eletrônico': 1,
        'Fita adesiva': 1
      }
    },
    LANTERNA: {
      name: 'LANTERNA',
      price: 0,
      materials: {
        'Vidros': 10,
        'Plásticos': 10,
        'Bateria AA': 1,
        'Fita isolante': 1
      }
    },
    PENTE: {
      name: 'PENTE',
      price: 0,
      materials: {
        'Alumínios': 35,
        'Plásticos': 50,
        'Borrachas': 50,
        'Fitas isolantes': 2,
        'Fitas adesivas': 2
      }
    },
    MIRA: {
      name: 'MIRA',
      price: 0,
      materials: {
        'Vidros': 10,
        'Plásticos': 10,
        'Bateria AA+': 1,
        'Fita adesiva': 1
      }
    },
    SILENCIADOR: {
      name: 'SILENCIADOR',
      price: 0,
      materials: {
        'Cobres': 25,
        'Plásticos': 50,
        'Garrafa vazia': 1,
        'Fita isolante': 1,
        'Fita adesiva': 1,
        'Pastas de dente': 2
      }
    },
    PECAS: {
      name: 'PEÇAS DE ARMA MÉDIA',
      price: 0,
      materials: {
        'Alumínios': 25,
        'Cobres': 25,
        'Vidros': 25,
        'Borrachas': 25,
        'Peças de Arma': 3,
        'Corpo de Sub': 1,
        'Dinheiro Sujo': 1000
      }
    },
    PLACA: {
      name: 'PLACA BLINDADA',
      price: 0,
      materials: {
        'Alumínios': 40,
        'Cobres': 40,
        'Vidros': 70,
        'Plásticos': 70,
        'Borrachas': 80,
        'Chapas': 2,
        'Placas': 2,
        'Dinheiro Sujo': 500
      }
    }
  };

  let selectedProduct = 'COLETE';

  // Aqui vai ficar salvo quanto tem de cada produto
  const cart = {};

  function formatCurrency(value) {
    return Number(value).toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });
  }

  function renderProductButtons() {
    const list = document.getElementById('productsList');
    list.innerHTML = '';

    Object.keys(products).forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'product-btn' + (key === selectedProduct ? ' active' : '');
      btn.textContent = products[key].name;
      btn.onclick = () => {
        selectedProduct = key;
        updateProductCard();
        renderProductButtons();
      };
      list.appendChild(btn);
    });
  }

  function updateProductCard() {
    const product = products[selectedProduct];
    document.getElementById('productName').textContent = product.name;
    document.getElementById('productPrice').textContent = formatCurrency(product.price);

    // mostra a quantidade já salva desse produto
    document.getElementById('quantity').value = cart[selectedProduct] || 0;

    renderPreviewResources(product.materials, cart[selectedProduct] || 0);
  }

  // Mostra só a prévia do produto atual
  function renderPreviewResources(materials, quantity) {
    const grid = document.getElementById('resourcesGrid');
    grid.innerHTML = '';

    Object.entries(materials).forEach(([material, amount]) => {
      const total = Number(amount) * Number(quantity);
      const card = document.createElement('div');
      card.className = 'resource-card';
      card.innerHTML = `
        <span>${material}</span>
        <span class="resource-value">${total}</span>
      `;
      grid.appendChild(card);
    });
  }

  // Soma tudo do carrinho
  function calculateMaterials() {
    const qty = Number(document.getElementById('quantity').value) || 0;
    const rate = Number(document.getElementById('discount').value) || 0;

    // salva a quantidade do produto atual no carrinho
    cart[selectedProduct] = qty;

    const totalMaterials = {};
    let totalBase = 0;

    Object.keys(cart).forEach(productKey => {
      const quantity = Number(cart[productKey]) || 0;
      if (quantity <= 0) return;

      const product = products[productKey];

      totalBase += Number(product.price) * quantity;

      Object.entries(product.materials).forEach(([material, amount]) => {
        if (!totalMaterials[material]) {
          totalMaterials[material] = 0;
        }
        totalMaterials[material] += Number(amount) * quantity;
      });
    });

    renderTotalResources(totalMaterials);

    const totalFinal = totalBase + (totalBase * rate / 100);
    document.getElementById('totalValue').textContent = formatCurrency(totalFinal);
  }

  // Mostra a soma total dos materiais de todos os produtos
  function renderTotalResources(materials) {
    const grid = document.getElementById('resourcesGrid');
    grid.innerHTML = '';

    if (Object.keys(materials).length === 0) {
      grid.innerHTML = `
        <div class="resource-card">
          <span>Nenhum material</span>
          <span class="resource-value">0</span>
        </div>
      `;
      return;
    }

    Object.entries(materials).forEach(([material, total]) => {
      const card = document.createElement('div');
      card.className = 'resource-card';
      card.innerHTML = `
        <span>${material}</span>
        <span class="resource-value">${total}</span>
      `;
      grid.appendChild(card);
    });
  }

  function clearAll() {
    document.getElementById('quantity').value = 0;
    document.getElementById('discount').value = 0;

    Object.keys(cart).forEach(key => delete cart[key]);

    document.getElementById('totalValue').textContent = formatCurrency(0);
    updateProductCard();
    renderProductButtons();
  }

  // Atualiza prévia ao digitar
  document.getElementById('quantity').addEventListener('input', () => {
    const qty = Number(document.getElementById('quantity').value) || 0;
    const product = products[selectedProduct];
    renderPreviewResources(product.materials, qty);
  });

  renderProductButtons();
  updateProductCard();
</script>
