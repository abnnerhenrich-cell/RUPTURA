<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUPTURA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top center, rgba(255, 166, 0, 0.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255, 115, 0, 0.06), transparent 24%),
        linear-gradient(135deg, #0f0f10, #171717 50%, #111111);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(180deg, rgba(34,34,34,0.96), rgba(24,24,24,0.98));
      border: 1px solid rgba(255, 149, 0, 0.20);
      border-radius: 24px;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255,255,255,0.04);
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }

    .site-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #ffd7a6;
      line-height: 1;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(255, 157, 47, 0.18),
        0 0 28px rgba(255, 157, 47, 0.10);
    }

    .site-subtitle {
      font-size: 11px;
      color: #f4c996;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-left: 2px;
      font-weight: 600;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 78px;
      height: 78px;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,140,0,0.12), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,140,0,0.26);
      box-shadow:
        0 0 24px rgba(255,140,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-left: auto;
      justify-content: flex-end;
    }

    .mode-box,
    .discount-box {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mode-box label,
    .discount-box label {
      color: #ffc57d;
      font-weight: 700;
      font-size: 14px;
    }

    .toggle-group {
      display: flex;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(255, 145, 0, 0.16);
    }

    .toggle-btn {
      background: linear-gradient(180deg, #2b2b2b, #1f1f1f);
      color: #d0d0d0;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .toggle-btn.active {
      background: linear-gradient(180deg, rgba(255,153,51,0.34), rgba(255,122,0,0.12));
      color: #fff;
      border-color: rgba(255,140,0,0.48);
      box-shadow: 0 0 18px rgba(255,140,0,0.16);
    }

    select, input {
      background: linear-gradient(180deg, #141414, #101010);
      color: #fff;
      border: 1px solid rgba(255, 145, 0, 0.22);
      border-radius: 14px;
      padding: 11px 13px;
      outline: none;
      transition: 0.2s ease;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      min-height: 46px;
    }

    select {
      -webkit-appearance: none;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #ffffff 50%),
        linear-gradient(135deg, #ffffff 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 34px;
    }

    select option {
      background: #171717;
      color: #ffffff;
    }

    select:focus, input:focus {
      border-color: #ff9d2f;
      box-shadow: 0 0 0 4px rgba(255, 157, 47, 0.14);
    }

    .products-list {
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .product-btn {
      background: linear-gradient(180deg, #2b2b2b, #1f1f1f);
      color: #bdbdbd;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 13px 12px;
      border-radius: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      text-align: center;
      transition: 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .product-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 157, 47, 0.34);
      color: #f0f0f0;
    }

    .product-btn.active {
      background: linear-gradient(180deg, rgba(255,153,51,0.34), rgba(255,122,0,0.12));
      color: #fff;
      border-color: rgba(255,140,0,0.48);
      box-shadow: 0 0 18px rgba(255,140,0,0.16);
    }

    .selected-products {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
    }

    .selected-product-card {
      background: linear-gradient(180deg, #1c1c1c, #171717);
      border: 1px solid rgba(255,140,0,0.18);
      border-radius: 20px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      box-shadow:
        0 10px 24px rgba(0,0,0,0.16),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .selected-product-info h3 {
      font-size: 22px;
      color: #ffb357;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      font-weight: 800;
      text-shadow: 0 0 12px rgba(255,157,47,0.14);
    }

    .selected-product-info p {
      color: #ffd6a9;
      font-weight: 600;
      font-size: 14px;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-box label {
      color: #ffc57d;
      font-weight: 700;
      font-size: 14px;
    }

    .quantity-input {
      width: 100px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .section-title {
      font-size: 22px;
      margin: 8px 0 16px;
      color: #ffc06f;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-align: center;
      text-shadow: 0 0 10px rgba(255,157,47,0.10);
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .resource-card {
      background: linear-gradient(180deg, #1d1d1d, #171717);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .resource-card span:first-child {
      font-size: 13px;
      font-weight: 600;
      color: #e7d6c5;
    }

    .resource-value {
      font-size: 28px;
      font-weight: 800;
      color: #ffab3d;
      text-shadow: 0 0 10px rgba(255,157,47,0.12);
    }

    .summary {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .summary-box {
      width: 100%;
      max-width: 460px;
      background: linear-gradient(180deg, rgba(255,140,0,0.18), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,140,0,0.24);
      border-radius: 20px;
      padding: 18px;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      box-shadow:
        0 0 24px rgba(255,140,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-calc {
      background: linear-gradient(180deg, #ffb14f, #ff7f11);
      color: #181818;
      box-shadow: 0 10px 22px rgba(255, 140, 0, 0.24);
    }

    .btn-clear {
      background: linear-gradient(180deg, #2c2c2c, #242424);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .brand {
        justify-content: center;
      }

      .toolbar {
        margin-left: 0;
        justify-content: center;
      }

      .selected-product-card {
        justify-content: center;
        text-align: center;
      }

      .summary-box {
        font-size: 20px;
      }

      .site-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo-container">
          <img src="https://i.imgur.com/KOjV87R.png" alt="Logo" class="logo" />
        </div>
        <div class="brand-text">
          <div class="site-title">RUPTURA</div>
          <div class="site-subtitle"></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="mode-box">
          <label>Comprador:</label>
          <div class="toggle-group">
            <button type="button" class="toggle-btn active" id="btnCPF">CNPJ</button>
            <button type="button" class="toggle-btn" id="btnCNPJ">CPF</button>
          </div>
        </div>

        <div class="discount-box">
          <label for="discount">Taxa / Desconto:</label>
          <select id="discount">
            <option value="0">Nenhum</option>
            <option value="5">+5%</option>
            <option value="10">+10%</option>
            <option value="20">+20%</option>
            <option value="30">+30%</option>
            <option value="-5">-5%</option>
            <option value="-10">-10%</option>
            <option value="-20">-20%</option>
            <option value="-30">-30%</option>
          </select>
        </div>
      </div>
    </div>

    <div class="products-list" id="productsList"></div>
    <div class="selected-products" id="selectedProductsContainer"></div>

    <div class="section-title">Materiais Necessários</div>
    <div class="resources-grid" id="resourcesGrid"></div>

    <div class="summary">
      <div class="summary-box">Total valor: <span id="totalValue">R$ 0,00</span></div>
    </div>

    <div class="buttons">
      <button class="btn-calc" onclick="calculateMaterials()">Calcular</button>
      <button class="btn-clear" onclick="clearAll()">Limpar</button>
    </div>
  </div>

  <script>
    const products = {
      COLETE: {
        name: 'COLETE',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Placas blindadas': 2,
          'Lonas': 5
        }
      },
      'TEC-9': {
        name: 'TEC-9',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Tubos de Plástico': 3,
          'Peças de Arma Média': 3,
          'Dinheiro Sujo': 500
        }
      },
      EMPUNHADURA: {
        name: 'EMPUNHADURA',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Plásticos': 10,
          'Borrachas': 10,
          'Componente eletrônico': 1,
          'Fita adesiva': 1
        }
      },
      LANTERNA: {
        name: 'LANTERNA',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA': 1,
          'Fita isolante': 1
        }
      },
      PENTE: {
        name: 'PENTE',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Alumínios': 35,
          'Plásticos': 50,
          'Borrachas': 50,
          'Fitas isolantes': 2,
          'Fitas adesivas': 2
        }
      },
      MIRA: {
        name: 'MIRA',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA+': 1,
          'Fita adesiva': 1
        }
      },
      SILENCIADOR: {
        name: 'SILENCIADOR',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Cobres': 25,
          'Plásticos': 50,
          'Garrafa vazia': 1,
          'Fita isolante': 1,
          'Fita adesiva': 1,
          'Pastas de dente': 2
        }
      },
      PECAS: {
        name: 'PEÇAS DE ARMA MÉDIA',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Alumínios': 25,
          'Cobres': 25,
          'Vidros': 25,
          'Borrachas': 25,
          'Peças de Arma': 3,
          'Corpo de Sub': 1,
          'Dinheiro Sujo': 1000
        }
      },
      PLACA: {
        name: 'PLACA BLINDADA',
        prices: {
          CNPJ: 0,
          CPF: 0
        },
        materials: {
          'Alumínios': 40,
          'Cobres': 40,
          'Vidros': 70,
          'Plásticos': 70,
          'Borrachas': 80,
          'Chapas': 2,
          'Placas': 2,
          'Dinheiro Sujo': 500
        }
      }
    };

    let selectedProducts = {};
    let currentMode = 'CNPJ';

    function formatCurrency(value) {
      return Number(value).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function getProductPrice(product) {
      if (product.prices && product.prices[currentMode] !== undefined) {
        return Number(product.prices[currentMode]);
      }
      return Number(product.price || 0);
    }

    function setMode(mode) {
      currentMode = mode;

      document.getElementById('btnCNPJ').classList.toggle('active', mode === 'CNPJ');
      document.getElementById('btnCPF').classList.toggle('active', mode === 'CPF');

      renderProductButtons();
      renderSelectedProducts();
      calculateMaterials();
    }

    function renderProductButtons() {
      const list = document.getElementById('productsList');
      list.innerHTML = '';

      Object.keys(products).forEach(key => {
        const btn = document.createElement('button');
        const isActive = key in selectedProducts;
        const product = products[key];

        btn.className = 'product-btn' + (isActive ? ' active' : '');
        btn.textContent = product.name;

        btn.onclick = () => {
          if (isActive) {
            delete selectedProducts[key];
          } else {
            selectedProducts[key] = 1;
          }

          renderProductButtons();
          renderSelectedProducts();
          calculateMaterials();
        };

        list.appendChild(btn);
      });
    }

    function renderSelectedProducts() {
      const container = document.getElementById('selectedProductsContainer');
      container.innerHTML = '';

      const keys = Object.keys(selectedProducts);

      if (keys.length === 0) {
        container.innerHTML = `
          <div class="selected-product-card">
            <div class="selected-product-info">
              <h3>Nenhum produto selecionado</h3>
              <p>Selecione um ou mais produtos acima</p>
            </div>
          </div>
        `;
        return;
      }

      keys.forEach(key => {
        const product = products[key];
        const qty = selectedProducts[key];
        const unitPrice = getProductPrice(product);

        const card = document.createElement('div');
        card.className = 'selected-product-card';

        card.innerHTML = `
          <div class="selected-product-info">
            <h3>${product.name}</h3>
            <p>Valor unitário (${currentMode}): ${formatCurrency(unitPrice)}</p>
          </div>

          <div class="qty-box">
            <label for="qty-${key}">Quantidade:</label>
            <input
              type="number"
              id="qty-${key}"
              class="quantity-input"
              min="0"
              value="${qty}"
            />
          </div>
        `;

        container.appendChild(card);

        const input = card.querySelector(`#qty-${CSS.escape(key)}`);
        input.addEventListener('input', (e) => {
          const value = Number(e.target.value);

          if (value <= 0 || isNaN(value)) {
            delete selectedProducts[key];
          } else {
            selectedProducts[key] = value;
          }

          renderProductButtons();
          renderSelectedProducts();
          calculateMaterials();
        });
      });
    }

    function renderResources(materials) {
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = '';

      const entries = Object.entries(materials);

      if (entries.length === 0) {
        grid.innerHTML = `
          <div class="resource-card" style="grid-column: 1 / -1;">
            <span>Nenhum produto selecionado</span>
            <span class="resource-value">0</span>
          </div>
        `;
        return;
      }

      entries.forEach(([material, total]) => {
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <span>${material}</span>
          <span class="resource-value">${total}</span>
        `;
        grid.appendChild(card);
      });
    }

    function calculateMaterials() {
      const rate = Number(document.getElementById('discount').value) || 0;

      let totalMaterials = {};
      let totalBase = 0;

      Object.keys(selectedProducts).forEach(key => {
        const product = products[key];
        const qty = Number(selectedProducts[key]) || 0;
        const unitPrice = getProductPrice(product);

        totalBase += unitPrice * qty;

        Object.entries(product.materials).forEach(([material, amount]) => {
          totalMaterials[material] = (totalMaterials[material] || 0) + (Number(amount) * qty);
        });
      });

      renderResources(totalMaterials);

      const totalFinal = totalBase + (totalBase * rate / 100);
      document.getElementById('totalValue').textContent = formatCurrency(totalFinal);
    }

    function clearAll() {
      selectedProducts = {};
      currentMode = 'CPF';
      document.getElementById('discount').value = 0;

      document.getElementById('btnCPF').classList.add('active');
      document.getElementById('btnCNPJ').classList.remove('active');

      renderProductButtons();
      renderSelectedProducts();
      renderResources({});
      document.getElementById('totalValue').textContent = formatCurrency(0);
    }

    document.getElementById('discount').addEventListener('change', calculateMaterials);
    document.getElementById('btnCNPJ').addEventListener('click', () => setMode('CNPJ'));
    document.getElementById('btnCPF').addEventListener('click', () => setMode('CPF'));

    renderProductButtons();
    renderSelectedProducts();
    renderResources({});
  </script>
</body>
</html>
