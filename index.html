<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUPTURA</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #111111, #1a1a1a, #22150b);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255, 136, 0, 0.18);
      border-radius: 22px;
      box-shadow: 0 0 30px rgba(255, 140, 0, 0.12);
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    .site-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ffc27a;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(0,0,0,0.35);
    }

    .site-subtitle {
      font-size: 11px;
      color: #e8c39d;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.85;
      margin-left: 1px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 74px;
      height: 74px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,140,0,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,140,0,0.18);
      box-shadow: 0 0 18px rgba(255,140,0,0.10);
      flex-shrink: 0;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .discount-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .discount-box label {
      color: #ffbb73;
      font-weight: 700;
    }

    select, input {
      background: #161616;
      color: #fff;
      border: 1px solid rgba(255, 145, 0, 0.22);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition: 0.2s ease;
    }

    select:focus, input:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.15);
    }

    .products-list {
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .product-btn {
      background: #1b1b1b;
      color: #ffb05a;
      border: 1px solid rgba(255, 140, 0, 0.15);
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: 0.2s ease;
    }

    .product-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .product-btn.active {
      background: linear-gradient(180deg, rgba(255,140,0,0.22), rgba(255,140,0,0.10));
      color: #fff;
      border-color: rgba(255,140,0,0.45);
      box-shadow: 0 0 12px rgba(255,140,0,0.18);
    }

    .product-card {
      width: 220px;
      margin: 0 auto 24px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,140,0,0.12), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,140,0,0.22);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 0 20px rgba(255,140,0,0.12);
    }

    .product-card h2 {
      font-size: 34px;
      color: #ff9d2f;
      margin-bottom: 6px;
    }

    .product-price {
      color: #ffd2a1;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .quantity-input {
      width: 100%;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .section-title {
      text-align: center;
      font-size: 24px;
      color: #ffae52;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .resource-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,140,0,0.05));
      border: 1px solid rgba(255, 140, 0, 0.18);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .resource-card span:first-child {
      color: #f4f4f4;
      font-size: 18px;
      font-weight: 700;
    }

    .resource-value {
      color: #ff8c00;
      font-size: 26px;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(255, 140, 0, 0.22);
    }

    .summary {
      text-align: center;
      margin-bottom: 18px;
    }

    .summary-box {
      display: inline-block;
      background: rgba(255,140,0,0.08);
      border: 1px solid rgba(255,140,0,0.18);
      border-radius: 14px;
      padding: 14px 22px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 0 14px rgba(255,140,0,0.10);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-calc {
      background: linear-gradient(180deg, #ff9d2f, #ff7a00);
      color: #111;
      box-shadow: 0 0 18px rgba(255, 140, 0, 0.25);
    }

    .btn-clear {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.10);
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .brand {
        justify-content: center;
      }

      .discount-box {
        margin-left: 0;
        justify-content: center;
      }

      .product-card {
        width: 100%;
      }

      .summary-box {
        width: 100%;
        font-size: 20px;
      }

      .site-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo-container">
          <img src="https://i.imgur.com/KOjV87R.png" alt="Logo" class="logo" />
        </div>
        <div class="brand-text">
          <div class="site-title">RUPTURA</div>
          <div class="site-subtitle"></div>
        </div>
      </div>

      <div class="discount-box">
        <label for="discount">Taxa / Desconto:</label>
        <select id="discount">
          <option value="0">Nenhum</option>
          <optgroup label="Taxas (acréscimo)">
            <option value="5">+5%</option>
            <option value="10">+10%</option>
            <option value="20">+20%</option>
            <option value="30">+30%</option>
          </optgroup>
          <optgroup label="Descontos">
            <option value="-5">-5%</option>
            <option value="-10">-10%</option>
            <option value="-20">-20%</option>
            <option value="-30">-30%</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="products-list" id="productsList"></div>

    <div class="product-card">
      <h2 id="productName">A</h2>
      <div class="product-price" id="productPrice">R$ 0,00</div>
      <input type="number" id="quantity" class="quantity-input" min="0" value="0" />
    </div>

    <div class="section-title">Materiais Necessários</div>

    <div class="resources-grid" id="resourcesGrid"></div>

    <div class="summary">
      <div class="summary-box">Total valor: <span id="totalValue">R$ 0,00</span></div>
    </div>

    <div class="buttons">
      <button class="btn-calc" onclick="calculateMaterials()">Calcular</button>
      <button class="btn-clear" onclick="clearAll()">Limpar</button>
    </div>
  </div>

  <script>
    const products = {
      COLETE: {
        name: 'COLETE',
        price: 0,
        materials: {
          'Placas blindadas': 2,
          'Lonas': 5
        }
      },
      EMPUNHADURA: {
        name: 'EMPUNHADURA',
        price: 0,
        materials: {
          'Plásticos': 10,
          'Borrachas': 10,
          'Componente eletrônico': 1,
          'Fita adesiva': 1
        }
      },
      LANTERNA: {
        name: 'LANTERNA',
        price: ,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA': 1,
          'Fita isolante': 1
        }
      },
      PENTE: {
        name: 'PENTE',
        price: 0,
        materials: {
          'Alumínios': 35,
          'Plásticos': 50,
          'Borrachas': 50,
          'Fitas isolantes': 2,
          'Fitas adesivas': 2
        }
      },
      MIRA: {
        name: 'MIRA',
        price: 0,
        materials: {
          'Vidros': 10,
          'Plásticos': 10,
          'Bateria AA+': 1,
          'Fita adesiva': 1
        }
      },
      SILENCIADOR: {
        name: 'SILENCIADOR',
        price: 0,
        materials: {
          'Cobres': 25,
          'Plásticos': 50,
          'Garrafa vazia': 1,
          'Fita isolante': 1,
          'Fita adesiva': 1,
          'Pastas de dente': 2
        }
      },
      PEÇAS: {
        name: 'PEÇAS DE ARMA MÉDIA',
        price: 0,
        materials: {
          'Alumínios': 25,
          'Cobres': 25,
          'Vidros': 25,
          'Borrachas': 25,
          'Peças de Armas': 3,
          'Corpo de Sub': 1,
          'Dinheiro Sujo': 1000
        }
      },
      PLACA: {
        name: 'PLACA BLINDADA',
        price: 0,
        materials: {
          'Alumínios': 40,
          'Cobres': 40,
          'Vidros': 70,
          'Plásticos': 70,
          'Borrachas': 80,
          'Chapas': 2,
          'Placas': 2,
          'Dinheiro Sujo': 500
        }
      },
      TEC-9: {
        name: 'TEC-9',
        price: 0,
        materials: {
          'Tubos de Plástico': 3,
          'Peças de Arma Média': 3,
          'Dinheiro Sujo'': 500
        }
      }
    };

    let selectedProduct = 'A';

    function formatCurrency(value) {
      return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderProductButtons() {
      const list = document.getElementById('productsList');
      list.innerHTML = '';

      Object.keys(products).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'product-btn' + (key === selectedProduct ? ' active' : '');
        btn.textContent = 'Produto ' + key;
        btn.onclick = () => {
          selectedProduct = key;
          updateProductCard();
          renderProductButtons();
          calculateMaterials();
        };
        list.appendChild(btn);
      });
    }

    function updateProductCard() {
      const product = products[selectedProduct];
      document.getElementById('productName').textContent = product.name;
      document.getElementById('productPrice').textContent = formatCurrency(product.price);
      renderResources(product.materials, 0);
      document.getElementById('totalValue').textContent = formatCurrency(0);
    }

    function renderResources(materials, quantity) {
      const grid = document.getElementById('resourcesGrid');
      grid.innerHTML = '';

      Object.entries(materials).forEach(([material, amount]) => {
        const total = amount * quantity;
        const card = document.createElement('div');
        card.className = 'resource-card';
        card.innerHTML = `
          <span>${material}</span>
          <span class="resource-value">${total}</span>
        `;
        grid.appendChild(card);
      });
    }

    function calculateMaterials() {
      const qty = Number(document.getElementById('quantity').value) || 0;
      const rate = Number(document.getElementById('discount').value) || 0;
      const product = products[selectedProduct];

      renderResources(product.materials, qty);

      const totalBase = product.price * qty;
      const totalFinal = totalBase + (totalBase * rate / 100);
      document.getElementById('totalValue').textContent = formatCurrency(totalFinal);
    }

    function clearAll() {
      document.getElementById('quantity').value = 0;
      document.getElementById('discount').value = 0;
      updateProductCard();
      renderProductButtons();
    }

    renderProductButtons();
    updateProductCard();
  </script>
</body>
</html>
