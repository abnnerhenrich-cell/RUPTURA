<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUPTURA</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
  background:linear-gradient(135deg,#111,#1a1a1a,#22150b);
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:1100px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,140,0,0.2);
  border-radius:20px;
  padding:20px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-box{
  width:70px;
  height:70px;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,140,0,0.3);
}

.logo{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title{
  font-size:28px;
  font-weight:900;
  color:#ffb15a;
  text-shadow:0 0 6px rgba(255,140,0,0.2);
}

/* SELECT */
.topbar select{
  background:#111;
  color:#fff;
  border:1px solid #ff8c00;
  padding:10px;
  border-radius:10px;
}

/* PRODUTOS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.products button{
  background:#1a1a1a;
  border:1px solid #ff8c00;
  color:#ffb15a;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.products button.active{
  background:#ff8c00;
  color:#000;
}

/* CARD */
.card{
  text-align:center;
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  border:1px solid #ff8c00;
  margin-bottom:20px;
}

.card h2{
  color:#ff8c00;
  font-size:32px;
}

input{
  background:#111;
  border:1px solid #ff8c00;
  color:#fff;
  padding:10px;
  border-radius:10px;
  width:100%;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.item{
  background:#111;
  border:1px solid #ff8c00;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.valor{
  font-size:22px;
  color:#ff8c00;
}

/* TOTAL */
.total{
  text-align:center;
  font-size:22px;
  margin:20px 0;
}

button.calc{
  width:100%;
  padding:15px;
  background:#ff8c00;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<div class="topbar">
  <div class="brand">
    <div class="logo-box">
      <img src="https://i.imgur.com/KOjV87R.png" class="logo">
    </div>
    <div class="title">RUPTURA</div>
  </div>

  <select id="taxa">
    <option value="0">Nenhum</option>

    <optgroup label="Taxas">
      <option value="10">+10%</option>
      <option value="20">+20%</option>
      <option value="30">+30%</option>
      <option value="50">+50%</option>
    </optgroup>

    <optgroup label="Descontos">
      <option value="-10">-10%</option>
      <option value="-20">-20%</option>
      <option value="-30">-30%</option>
    </optgroup>
  </select>
</div>

<div class="products" id="produtos"></div>

<div class="card">
  <h2 id="nome">A</h2>
  <input type="number" id="qtd" value="0">
</div>

<div class="grid" id="materiais"></div>

<div class="total">
Total: <span id="total">R$ 0</span>
</div>

<button class="calc" onclick="calc()">CALCULAR</button>

</div>

<script>
const produtos={
A:{m:{placas:2,lonas:5}},
B:{m:{plasticos:10,borrachas:10,eletronico:1,fita:1}},
C:{m:{vidros:10,plasticos:10,bateria:1,fita:1}},
D:{m:{aluminio:35,plasticos:50,borrachas:50,fita:2}},
E:{m:{vidros:10,plasticos:10,fita:1}},
F:{m:{cobre:25,plasticos:50,garrafa:1,fita:1,pasta:2}},
G:{m:{aluminio:25,cobre:25,vidro:25,borracha:25,dinheiro:1000}},
H:{m:{aluminio:40,cobre:40,vidro:70,plastico:70,borracha:80,dinheiro:500}},
I:{m:{aluminio:25,cobre:25,vidro:25,borracha:25,dinheiro:1000}}
};

let atual="A";

function render(){
  let d=document.getElementById("produtos");
  d.innerHTML="";
  Object.keys(produtos).forEach(p=>{
    let b=document.createElement("button");
    b.innerText=p;
    b.onclick=()=>{atual=p;render();}
    if(p==atual)b.classList.add("active");
    d.appendChild(b);
  });
}

function calc(){
  let qtd=Number(document.getElementById("qtd").value);
  let taxa=Number(document.getElementById("taxa").value);
  let grid=document.getElementById("materiais");
  grid.innerHTML="";

  Object.entries(produtos[atual].m).forEach(([k,v])=>{
    grid.innerHTML+=`<div class="item">${k}<div class="valor">${v*qtd}</div></div>`;
  });

  let total=qtd*100;
  total+=total*(taxa/100);

  document.getElementById("total").innerText=
  total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

render();
</script>

</body>
</html>
